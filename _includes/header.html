<header class="site-header">
  <div class="container header-row">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="TAROT 2026 home">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="TAROT 2026" class="logo"/>
    </a>

    <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="nav-toggle-line" aria-hidden="true"></span>
      <span class="nav-toggle-line" aria-hidden="true"></span>
      <span class="nav-toggle-line" aria-hidden="true"></span>
    </button>

    <nav id="nav-menu" class="nav" aria-label="Main navigation">
    {% assign current = page.url | remove: 'index.html' %}
    <!-- <a class="nav-link {% if current == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">Home</a> -->
    <a class="nav-link {% if current contains '/school/program' %}active{% endif %}" href="{{ '/school/program/' | relative_url }}">Program</a>
    <a class="nav-link {% if current contains '/school/lecturers' %}active{% endif %}" href="{{ '/school/lecturers/' | relative_url }}">Lecturers</a>
    <a class="nav-link {% if current contains '/organisation' %}active{% endif %}" href="{{ '/organisation/' | relative_url }}">Organisers</a>
    <a class="nav-link {% if current contains '/venue' %}active{% endif %}" href="{{ '/venue/' | relative_url }}">Venue</a>
    <a class="nav-link {% if current contains '/accommodation' %}active{% endif %}" href="{{ '/accommodation/' | relative_url }}">Accomodation</a>
    <a class="nav-link {% if current contains '/important-dates' %}active{% endif %}" href="{{ '/important-dates/' | relative_url }}">Important dates</a>
    <a class="nav-link {% if current contains '/sponsors' %}active{% endif %}" href="{{ '/sponsors/' | relative_url }}">Sponsors</a>
    <a class="nav-link {% if current contains '/registration' %}active{% endif %}" href="{{ '/registration/' | relative_url }}">Registration</a>
    <a class="nav-link {% if current contains '/past-editions' %}active{% endif %}" href="{{ '/past-editions/' | relative_url }}">Past editions</a>
    </nav>
    <script>
      document.addEventListener('DOMContentLoaded', function(){
        (function(){
          var header = document.querySelector('.site-header');
          if (!header || header.dataset.navInit === '1') return;
          header.dataset.navInit = '1';

          // Mobile hamburger toggle (open/close #nav-menu)
          var toggleBtn = header.querySelector('#nav-toggle');
          var nav = header.querySelector('#nav-menu');
          if (toggleBtn && nav) {
            var lastTouch = 0;

            function isMobileNav() {
              return window.matchMedia('(max-width: 900px)').matches;
            }

            function positionMobileNav() {
              if (!isMobileNav() || !nav.classList.contains('open')) return;
              var headerRect = header.getBoundingClientRect();
              var top = Math.max(0, headerRect.bottom);
              nav.style.position = 'fixed';
              nav.style.top = top + 'px';
              nav.style.left = '0';
              nav.style.right = '0';
              nav.style.zIndex = '3000';
              nav.style.maxHeight = 'calc(100vh - ' + top + 'px)';
              nav.style.overflowY = 'auto';
              document.documentElement.style.setProperty('--mobile-nav-top', top + 'px');
              nav.style.webkitOverflowScrolling = 'touch';
            }

            function resetMobileNavPosition() {
              nav.style.position = '';
              nav.style.top = '';
              nav.style.left = '';
              nav.style.right = '';
              nav.style.zIndex = '';
              nav.style.maxHeight = '';
              nav.style.overflowY = '';
              nav.style.webkitOverflowScrolling = '';
              document.documentElement.style.removeProperty('--mobile-nav-top');
            }

            function closeNav() {
              nav.classList.remove('open');
              toggleBtn.setAttribute('aria-expanded', 'false');
              toggleBtn.setAttribute('aria-label', 'Open navigation menu');
              resetMobileNavPosition();
            }

            function toggleNav(e) {
              if (e) { e.preventDefault(); e.stopPropagation(); if (e.stopImmediatePropagation) e.stopImmediatePropagation(); }
              var isOpen = nav.classList.toggle('open');
              toggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
              toggleBtn.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
              if (isOpen) {
                positionMobileNav();
              } else {
                resetMobileNavPosition();
              }
            }
            // Use pointerdown first: it is more reliable than click/touchend on iOS after scrolling.
            toggleBtn.addEventListener('click', function(ev) {

              toggleNav(ev);

            });

            // Close mobile nav after clicking any link (better UX)
            nav.addEventListener('click', function (e) {
              if (e.target.closest('a')) {
                closeNav();
              }
            });
          }

          // Click-to-open submenu for School
          header.addEventListener('click', function(e){
            var trigger = e.target.closest('.nav-trigger');
            if (!trigger) return;
            var group = trigger.closest('.nav-group');
            var isOpen = group.classList.contains('open');
            header.querySelectorAll('.nav-group.open').forEach(function(g){
              if (g !== group) {
                g.classList.remove('open');
                var t = g.querySelector('.nav-trigger');
                if (t) t.setAttribute('aria-expanded','false');
              }
            });
            group.classList.toggle('open', !isOpen);
            trigger.setAttribute('aria-expanded', !isOpen ? 'true' : 'false');
          });

          // Close dropdowns & mobile nav when clicking outside
          document.addEventListener('click', function(e){
            if (e.target.closest && e.target.closest('#nav-toggle')) return;
            if (!header.contains(e.target)) {
              header.querySelectorAll('.nav-group.open').forEach(function(g){
                g.classList.remove('open');
                var t = g.querySelector('.nav-trigger');
                if (t) t.setAttribute('aria-expanded','false');
              });
              if (nav && toggleBtn) closeNav();
            }
          });

          window.addEventListener('resize', function(){
            if (!nav.classList.contains('open')) return;
            if (isMobileNav()) {
              positionMobileNav();
            } else {
              resetMobileNavPosition();
            }
          });

          window.addEventListener('scroll', function(){
            if (nav.classList.contains('open')) positionMobileNav();
          }, { passive: true });
        })();
      });
    </script>
  </div>
</header>
<style>
.site-header {
  position: sticky;
  top: 0;
  z-index: 3000;
  pointer-events: auto;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  border-bottom: 1px solid rgba(226, 232, 240, 0.78);
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: saturate(180%) blur(18px);
  -webkit-backdrop-filter: saturate(180%) blur(18px);
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.055);
}

.site-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 8% 0%, rgba(245, 158, 11, 0.12), transparent 28%),
    radial-gradient(circle at 96% 0%, rgba(14, 165, 233, 0.08), transparent 24%);
  pointer-events: none;
}

.header-row {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 74px;
}

.brand {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  min-width: 0;
  padding: 0.45rem 0.15rem;
  border-radius: 18px;
  text-decoration: none;
  transition: transform 0.18s ease, filter 0.18s ease;
}

.brand:hover {
  transform: translateY(-1px);
  filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.12));
}

.brand:focus-visible,
.nav-link:focus-visible,
.nav-toggle:focus-visible {
  outline: 3px solid #f59e0b;
  outline-offset: 4px;
}

.logo {
  display: block;
  width: auto;
  height: clamp(44px, 6vw, 58px);
  max-width: min(34vw, 240px);
  object-fit: contain;
}

.nav {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.18rem;
  min-width: 0;
  flex: 1 1 auto;
}

.nav-link {
  position: relative;
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  padding: 0.58rem 0.58rem;
  border-radius: 999px;
  color: #374151;
  font-size: clamp(0.76rem, 0.82vw, 0.9rem);
  font-weight: 800;
  line-height: 1;
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.16s ease, background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
}

.nav-link:hover {
  color: #111827;
  background: rgba(241, 245, 249, 0.92);
  transform: translateY(-1px);
}

.nav-link.active {
  color: #111827;
  background: #fff;
  box-shadow: inset 0 0 0 1px rgba(226, 232, 240, 0.95), 0 10px 22px rgba(15, 23, 42, 0.08);
}

.nav-toggle {
  position: relative;
  z-index: 3001;
  display: none;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border: 1px solid rgba(203, 213, 225, 0.95);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
  cursor: pointer;
  pointer-events: auto;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.nav-toggle-line {
  position: absolute;
  width: 20px;
  height: 2px;
  border-radius: 999px;
  background: #111827;
  transition: transform 0.18s ease, opacity 0.18s ease;
}

.nav-toggle-line:nth-child(1) {
  transform: translateY(-7px);
}

.nav-toggle-line:nth-child(3) {
  transform: translateY(7px);
}

.nav-toggle[aria-expanded="true"] .nav-toggle-line:nth-child(1) {
  transform: rotate(45deg);
}

.nav-toggle[aria-expanded="true"] .nav-toggle-line:nth-child(2) {
  opacity: 0;
}

.nav-toggle[aria-expanded="true"] .nav-toggle-line:nth-child(3) {
  transform: rotate(-45deg);
}

@media (max-width: 1180px) {
  .logo {
    max-width: min(30vw, 210px);
  }

  .nav-link {
    padding-inline: 0.42rem;
    font-size: 0.78rem;
  }
}

@media (max-width: 1040px) {
  .logo {
    max-width: min(28vw, 190px);
  }

  .nav-link {
    padding-inline: 0.34rem;
    font-size: 0.74rem;
  }
}

@media (max-width: 900px) {
  .header-row {
    min-height: 70px;
  }

  .nav-toggle {
    display: inline-flex;
    flex: 0 0 auto;
  }

  .nav {
    display: none;
  }

  .nav.open {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.35rem;
    padding: 0.85rem;
    border-top: 1px solid rgba(226, 232, 240, 0.8);
    border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    background:
      radial-gradient(circle at top left, rgba(245, 158, 11, 0.12), transparent 32%),
      rgba(255, 255, 255, 0.96);
    backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    box-shadow: 0 22px 48px rgba(15, 23, 42, 0.14);
  }

  .nav.open .nav-link {
    justify-content: space-between;
    min-height: 48px;
    padding: 0.9rem 1rem;
    border-radius: 14px;
    background: rgba(248, 250, 252, 0.86);
    color: #111827;
  }

  .nav.open .nav-link::after {
    content: "›";
    color: #9ca3af;
    font-size: 1.25rem;
    line-height: 1;
  }

  .nav.open .nav-link.active {
    background: #111827;
    color: #fff;
    box-shadow: 0 14px 28px rgba(15, 23, 42, 0.16);
  }

  .nav.open .nav-link.active::after {
    color: rgba(255, 255, 255, 0.72);
  }
}

@media (prefers-reduced-motion: reduce) {
  .brand,
  .nav-link,
  .nav-toggle-line {
    transition: none;
  }

  .brand:hover,
  .nav-link:hover {
    transform: none;
  }
}
</style>
</header>
