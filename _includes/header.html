<header class="site-header" style="position: sticky; top: 0; z-index: 3000; pointer-events: auto; -webkit-transform: translateZ(0); transform: translateZ(0);">
  <div class="container header-row">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="TAROT logo" class="logo"/>
    </a>

    <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu" style="position:relative; z-index:3001; pointer-events:auto; cursor:pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent;">☰</button>

    <nav id="nav-menu" class="nav">
    {% assign current = page.url | remove: 'index.html' %}
    <!-- <a class="nav-link {% if current == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">Home</a> -->
    <a class="nav-link {% if current contains '/school/program' %}active{% endif %}" href="{{ '/school/program/' | relative_url }}">Program</a>
    <a class="nav-link {% if current contains '/school/lecturers' %}active{% endif %}" href="{{ '/school/lecturers/' | relative_url }}">Lecturers</a>
    <a class="nav-link {% if current contains '/organisation' %}active{% endif %}" href="{{ '/organisation/' | relative_url }}">Organisers</a>
    <a class="nav-link {% if current contains '/venue' %}active{% endif %}" href="{{ '/venue/' | relative_url }}">Venue</a>
    <a class="nav-link {% if current contains '/important-dates' %}active{% endif %}" href="{{ '/important-dates/' | relative_url }}">Important dates</a>
    <a class="nav-link {% if current contains '/sponsors' %}active{% endif %}" href="{{ '/sponsors/' | relative_url }}">Sponsors</a>
    <a class="nav-link {% if current contains '/registration' %}active{% endif %}" href="{{ '/registration/' | relative_url }}">Registration</a>
    <a class="nav-link {% if current contains '/past-editions' %}active{% endif %}" href="{{ '/past-editions/' | relative_url }}">Past editions</a>
    </nav>
    <script>
      document.addEventListener('DOMContentLoaded', function(){
        (function(){
          var header = document.querySelector('.site-header');
          if (!header || header.dataset.navInit === '1') return;
          header.dataset.navInit = '1';

          // Mobile hamburger toggle (open/close #nav-menu)
          var toggleBtn = header.querySelector('#nav-toggle');
          var nav = header.querySelector('#nav-menu');
          if (toggleBtn && nav) {
            var lastTouch = 0;

            function isMobileNav() {
              return window.matchMedia('(max-width: 900px)').matches;
            }

            function positionMobileNav() {
              if (!isMobileNav() || !nav.classList.contains('open')) return;
              var headerRect = header.getBoundingClientRect();
              var top = Math.max(0, headerRect.bottom);
              nav.style.position = 'fixed';
              nav.style.top = top + 'px';
              nav.style.left = '0';
              nav.style.right = '0';
              nav.style.zIndex = '3000';
              nav.style.maxHeight = 'calc(100vh - ' + top + 'px)';
              nav.style.overflowY = 'auto';
              nav.style.webkitOverflowScrolling = 'touch';
            }

            function resetMobileNavPosition() {
              nav.style.position = '';
              nav.style.top = '';
              nav.style.left = '';
              nav.style.right = '';
              nav.style.zIndex = '';
              nav.style.maxHeight = '';
              nav.style.overflowY = '';
              nav.style.webkitOverflowScrolling = '';
            }

            function closeNav() {
              nav.classList.remove('open');
              toggleBtn.setAttribute('aria-expanded', 'false');
              resetMobileNavPosition();
            }

            function toggleNav(e) {
              if (e) { e.preventDefault(); e.stopPropagation(); if (e.stopImmediatePropagation) e.stopImmediatePropagation(); }
              var isOpen = nav.classList.toggle('open');
              toggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
              if (isOpen) {
                positionMobileNav();
              } else {
                resetMobileNavPosition();
              }
            }
            // Use pointerdown first: it is more reliable than click/touchend on iOS after scrolling.
            toggleBtn.addEventListener('pointerdown', function(ev){
              lastTouch = Date.now();
              toggleNav(ev);
            }, { passive: false });

            toggleBtn.addEventListener('touchend', function(ev){
              if (Date.now() - lastTouch < 500) { ev.preventDefault(); ev.stopPropagation(); return; }
              lastTouch = Date.now();
              toggleNav(ev);
            }, { passive: false });

            toggleBtn.addEventListener('click', function(ev){
              if (Date.now() - lastTouch < 700) { ev.preventDefault(); ev.stopPropagation(); return; }
              toggleNav(ev);
            }, { passive: false });

            // Close mobile nav after clicking any link (better UX)
            nav.addEventListener('click', function (e) {
              if (e.target.closest('a')) {
                closeNav();
              }
            });
          }

          // Click-to-open submenu for School
          header.addEventListener('click', function(e){
            var trigger = e.target.closest('.nav-trigger');
            if (!trigger) return;
            var group = trigger.closest('.nav-group');
            var isOpen = group.classList.contains('open');
            header.querySelectorAll('.nav-group.open').forEach(function(g){
              if (g !== group) {
                g.classList.remove('open');
                var t = g.querySelector('.nav-trigger');
                if (t) t.setAttribute('aria-expanded','false');
              }
            });
            group.classList.toggle('open', !isOpen);
            trigger.setAttribute('aria-expanded', !isOpen ? 'true' : 'false');
          });

          // Close dropdowns & mobile nav when clicking outside
          document.addEventListener('click', function(e){
            if (e.target.closest && e.target.closest('#nav-toggle')) return;
            if (!header.contains(e.target)) {
              header.querySelectorAll('.nav-group.open').forEach(function(g){
                g.classList.remove('open');
                var t = g.querySelector('.nav-trigger');
                if (t) t.setAttribute('aria-expanded','false');
              });
              if (nav && toggleBtn) closeNav();
            }
          });

          window.addEventListener('resize', function(){
            if (!nav.classList.contains('open')) return;
            if (isMobileNav()) {
              positionMobileNav();
            } else {
              resetMobileNavPosition();
            }
          });

          window.addEventListener('scroll', function(){
            if (nav.classList.contains('open')) positionMobileNav();
          }, { passive: true });
        })();
      });
    </script>
  </div>
</header>
